<!DOCTYPE html>
<html>
<head>
    <title>TENANTDATA</title>
</head>

<body>

    <h1>Upload the Aadhaar Image</h1>

    <!-- ADD FILE INPUT (missing in your code) -->
    <input type="file" id="imageInput" accept="image/*">

    <br><br>

    <img id="Preview" width="300" style="display: none;">

    <br><br>

    <button onclick="uploadImage()">Upload</button>

    <script>
        const imageInput = document.getElementById("imageInput");
        const Preview = document.getElementById("Preview");

        // FIX: files (not file)
        imageInput.addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                Preview.src = URL.createObjectURL(file);
                Preview.style.display = "block";
            }
        });

        async function uploadImage() {
            // FIX: files (not file)
            const file = imageInput.files[0];

            if (!file) {
                alert("Please select an image");
                return;
            }

            // FIX: FormData (capital F and D)
            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch(
                    "http://127.0.0.1:8000/upload-adhaar",
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const result = await response.json();
                console.log(result);
                alert("Upload successful!");
            }
            catch (error) {
                console.error(error);
                alert("Couldn't Upload the file Please try again");
            }
        }
    </script>

</body>
</html>
